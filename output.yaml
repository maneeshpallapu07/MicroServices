        ports:
        - containerPort: 5003

        env:
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: microservice-config
              key: USER_SERVICE_URL

        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: microservice-config
              key: PRODUCT_SERVICE_URL

        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: microservice-config
              key: PAYMENT_SERVICE_URL

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 250m
            memory: 256Mi

        livenessProbe:
          httpGet:
            path: /health
            port: 5003

          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 5003

          initialDelaySeconds: 5
          periodSeconds: 5
