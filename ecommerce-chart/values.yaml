namespace: ecommerce

global:
  imageTag: v1

configMap:
  name: microservice-config

  userServiceUrl: http://user-service:5001
  productServiceUrl: http://product-service:5002
  orderServiceUrl: http://order-service:5003
  paymentServiceUrl: http://payment-service:5004

frontend:
  name: frontend

  replicaCount: 4

  image:
    repository: maneeshdock/frontend
    pullPolicy: Always

  containerPort: 5000

  service:
    port: 5000
    targetPort: 5000
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 250m
      memory: 256Mi

  probes:
    liveness:
      path: /
      initialDelaySeconds: 15
      periodSeconds: 10

    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 5

userService:
  name: user-service

  replicaCount: 2

  image:
    repository: maneeshdock/user-service
    pullPolicy: Always

  containerPort: 5001

  service:
    port: 5001
    targetPort: 5001
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 250m
      memory: 256Mi

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10

    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

productService:
  name: product-service

  replicaCount: 2

  image:
    repository: maneeshdock/product-service
    pullPolicy: Always

  containerPort: 5002

  service:
    port: 5002
    targetPort: 5002
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 250m
      memory: 256Mi

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10

    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

orderService:
  name: order-service

  replicaCount: 2

  image:
    repository: maneeshdock/order-service
    pullPolicy: Always

  containerPort: 5003

  service:
    port: 5003
    targetPort: 5003
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 250m
      memory: 256Mi

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10

    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

paymentService:
  name: payment-service

  replicaCount: 2

  image:
    repository: maneeshdock/payment-service
    pullPolicy: Always

  containerPort: 5004

  service:
    port: 5004
    targetPort: 5004
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 250m
      memory: 256Mi

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10

    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

ingress:
  name: ecommerce-ingress

  className: nginx

  rewriteTarget: /

  path: /
  pathType: Prefix

  backendService: frontend
  backendPort: 5000
