apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.productService.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.productService.name }}

spec:
  replicas: {{ .Values.productService.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.productService.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.productService.name }}

    spec:
      containers:
      - name: {{ .Values.productService.name }}

        image: "{{ .Values.productService.image.repository }}:{{ .Values.productService.image.tag }}"

        imagePullPolicy: {{ .Values.productService.image.pullPolicy }}

        ports:
        - containerPort: {{ .Values.productService.containerPort }}

        resources:
          requests:
            cpu: {{ .Values.productService.resources.requests.cpu }}
            memory: {{ .Values.productService.resources.requests.memory }}

          limits:
            cpu: {{ .Values.productService.resources.limits.cpu }}
            memory: {{ .Values.productService.resources.limits.memory }}

        livenessProbe:
          httpGet:
            path: {{ .Values.productService.probes.liveness.path }}
            port: {{ .Values.productService.containerPort }}

          initialDelaySeconds: {{ .Values.productService.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.productService.probes.liveness.periodSeconds }}

        readinessProbe:
          httpGet:
            path: {{ .Values.productService.probes.readiness.path }}
            port: {{ .Values.productService.containerPort }}

          initialDelaySeconds: {{ .Values.productService.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.productService.probes.readiness.periodSeconds }}

---
apiVersion: v1
kind: Service

metadata:
  name: {{ .Values.productService.name }}
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: {{ .Values.productService.name }}

  ports:
  - protocol: TCP
    port: {{ .Values.productService.service.port }}
    targetPort: {{ .Values.productService.service.targetPort }}

  type: {{ .Values.productService.service.type }}
